<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM CRITICAL ERROR | HACKED</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --hacker-green: #00FF41; 
            --bg-black: #000;
        }
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg-black);
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Courier Prime', monospace;
        }

        /* --- [NEW] ระบบ Blackout Layer (ใช้ตอนจอดับ) --- */
        #blackout {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: none;
        }

        /* --- [NEW] จำลองหน้าเว็บแชทเดิม (ใช้ตอนแวบขึ้นมา) --- */
        #mockupChat {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; z-index: 5000; display: none;
            justify-content: center; align-items: center;
        }
        .chat-box-mock {
            width: 400px; height: 600px; border: 2px solid #d4af37;
            border-radius: 20px; background: #000;
        }

        #matrixCanvas { position: fixed; top: 0; left: 0; z-index: 1; }

        .hacker-overlay {
            position: relative; z-index: 2; text-align: center;
            background: rgba(0, 0, 0, 0.8); padding: 40px;
            border: 2px solid var(--hacker-green);
            box-shadow: 0 0 20px var(--hacker-green);
            max-width: 90%; animation: flicker 0.1s infinite;
        }

        .status-msg {
            color: var(--hacker-green); font-size: 1.5rem;
            font-weight: bold; text-transform: uppercase;
            letter-spacing: 5px; margin-bottom: 20px;
        }

        .warning-text {
            color: #ff0000; font-size: 1rem; margin-top: 10px;
            border-top: 1px solid #ff0000; padding-top: 10px;
        }

        @keyframes flicker {
            0% { opacity: 0.9; } 50% { opacity: 1; } 100% { opacity: 0.9; }
        }

        #loginOverlay, #chatWindow, #customAlert { display: none !important; }
    </style>
</head>
<body>

    <div id="blackout"></div>

    <div id="mockupChat">
        <div class="chat-box-mock" style="display:flex; flex-direction:column;">
            <div style="background:#d4af37; height:50px; border-radius:18px 18px 0 0;"></div>
            <div style="flex:1; padding:20px;">
                <div style="background:#222; width:70%; height:30px; border-radius:10px; margin-bottom:10px;"></div>
                <div style="background:#d4af37; width:60%; height:30px; border-radius:10px; align-self:flex-end;"></div>
            </div>
        </div>
    </div>

    <canvas id="matrixCanvas"></canvas>

    <div class="hacker-overlay" id="hackerUI">
        <div class="status-msg">SYSTEM HACKED</div>
        <div style="color: #00FF41; font-size: 0.8rem;">
            ACCESS DENIED... BYPASSING SECURITY...<br>
            ENCRYPTING DATABASE... 100% DONE<br>
            DELETING CONAN_ASSISTANT_V2.SYS
        </div>
        <div class="warning-text">CRITICAL ERROR: CONNECTION LOST</div>
    </div>

    <script>
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        const blackout = document.getElementById('blackout');
        const mockup = document.getElementById('mockupChat');
        const hackerUI = document.getElementById('hackerUI');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const characters = "CONAN01SHINICHIAPTX4869KID1412ERRORHACKED010101";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];
        for (let i = 0; i < columns; i++) drops[i] = 1;

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00FF41";
            ctx.font = fontSize + "px 'Courier Prime'";
            for (let i = 0; i < drops.length; i++) {
                const text = characters.charAt(Math.floor(Math.random() * characters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 33);

        // --- [NEW] ระบบ Loop จอดับ และกู้คืนแวบหนึ่ง ---
        function triggerGlitchLoop() {
            // 1. จอดับ (Blackout)
            setTimeout(() => {
                blackout.style.display = 'block';
                
                // 2. จอติดขึ้นมาเห็นหน้าเว็บแชทแวบหนึ่ง (0.3 วินาที)
                setTimeout(() => {
                    blackout.style.display = 'none';
                    mockup.style.display = 'flex';
                    hackerUI.style.display = 'none';
                    canvas.style.opacity = '0';

                    // 3. โดนแฮ็กซ้ำ (กลับมาเป็นหน้า Matrix เหมือนเดิม)
                    setTimeout(() => {
                        mockup.style.display = 'none';
                        hackerUI.style.display = 'block';
                        canvas.style.opacity = '1';
                        
                        // รัน Loop ต่อไปทุกๆ 5-10 วินาที
                        setTimeout(triggerGlitchLoop, Math.random() * 5000 + 5000);
                    }, 300); 

                }, 1000); // ดับไป 1 วินาที

            }, 5000); // เริ่มอาการหลังผ่านไป 5 วินาที
        }

        window.onload = () => {
            triggerGlitchLoop();
        };

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>

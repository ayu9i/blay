<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONAN OMEGA: TITAN PROTOCOL 💣 [NITRO V4.5]</title>
    
    <style>
        :root {
            --danger: #ff0000;
            --danger-glow: rgba(255, 0, 0, 0.7);
            --success: #00ff00;
            --success-glow: rgba(0, 255, 0, 0.5);
            --gold: #ffd700;
            --bg-deep: #020205;
            --bg-panel: rgba(13, 13, 15, 0.95);
            --neon-blue: #00f2ff;
            --wire-shadow: rgba(0, 0, 0, 0.9);
            --interface-border: #1a1a1f;
            --font-main: 'Segoe UI', Roboto, sans-serif;
            --font-digital: 'Orbitron', 'Courier New', monospace;
        }

        /* [PERFORMANCE OPTIMIZATION] */
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            outline: none;
            scrollbar-width: none;
            /* ใช้ hardware acceleration สำหรับทุก element */
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        body { 
            background-color: var(--bg-deep); 
            color: #ffffff; 
            margin: 0; 
            padding: 0;
            overflow: hidden; 
            height: 100vh; 
            width: 100vw;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: var(--font-main);
        }

        #neural-canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: -1; 
            opacity: 0.4;
            will-change: transform;
        }

        #mainframe {
            background: var(--bg-panel);
            border: 2px solid var(--interface-border);
            border-radius: 35px;
            padding: 30px;
            width: 92%;
            max-width: 580px;
            position: relative;
            box-shadow: 0 0 80px rgba(0,0,0,1), inset 0 0 20px rgba(0, 242, 255, 0.08);
            z-index: 10;
            backdrop-filter: blur(15px);
            transition: transform 0.1s cubic-bezier(0.2, 0, 0.2, 1);
        }

        .lang-switch {
            position: absolute;
            top: -50px;
            right: 0;
            display: flex;
            gap: 10px;
        }

        .lang-btn {
            background: rgba(26, 26, 31, 0.8);
            border: 1px solid var(--interface-border);
            color: #888;
            padding: 5px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: 0.2s ease;
        }

        .lang-btn.active {
            border-color: var(--neon-blue);
            color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.3);
        }

        .telemetry-bar { 
            display: flex; 
            justify-content: space-between; 
            font-size: 0.7rem; 
            color: var(--neon-blue); 
            margin-bottom: 25px; 
            border-bottom: 1px solid var(--interface-border); 
            padding-bottom: 12px; 
            letter-spacing: 2px;
            font-family: var(--font-digital);
        }

        .display-core {
            background: #000;
            border: 1px solid #222;
            padding: 25px;
            border-radius: 25px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: inset 0 0 40px rgba(255, 0, 0, 0.12);
            position: relative;
            overflow: hidden;
        }

        .timer-readout { 
            font-size: 5rem; 
            color: var(--danger); 
            text-shadow: 0 0 35px var(--danger-glow); 
            font-weight: 900; 
            margin: 0; 
            font-family: var(--font-digital);
            letter-spacing: -3px;
        }

        .progress-track {
            height: 4px;
            background: #111;
            margin-top: 20px;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--gold), #fff);
            box-shadow: 0 0 10px var(--gold);
            /* ใช้ transition ที่เร็วและนุ่มขึ้น */
            transition: width 0.1s linear;
        }

        .wire-matrix { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 15px; 
            margin-bottom: 35px; 
        }

        .wire-unit {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .wire-cable { 
            width: 100%;
            height: 100px; 
            border-radius: 12px; 
            cursor: pointer; 
            position: relative; 
            overflow: hidden; 
            /* อัปเกรดความเร็ว transition */
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            box-shadow: inset -8px 0 15px var(--wire-shadow), 0 5px 15px rgba(0,0,0,0.6); 
        }

        /* [ELECTRICITY OPTIMIZATION] */
        .wire-cable::after {
            content: ""; 
            position: absolute; 
            top: -100%; 
            left: 0; 
            width: 100%; 
            height: 60%;
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.45), transparent); 
            animation: electricity 1.2s linear infinite;
        }

        @keyframes electricity { from { top: -100%; } to { top: 100%; } }

        .wire-cable.severed { 
            height: 25px; 
            background: #050505 !important; 
            opacity: 0.2; 
            transform: translateY(20px) scale(0.9); 
            box-shadow: none; 
            cursor: default; 
        }

        .control-array { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        button.cmd {
            background: linear-gradient(180deg, #1a1a1f 0%, #0d0d0f 100%);
            color: #aaa;
            border: 1px solid #333;
            padding: 18px;
            border-radius: 15px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: 800;
            font-size: 0.75rem;
            transition: 0.2s all;
            letter-spacing: 1px;
        }

        button.cmd:hover { 
            border-color: var(--neon-blue); 
            color: #fff;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); 
        }

        button.cmd.active {
            border-color: var(--gold);
            color: var(--gold);
            background: #1a1a15;
        }

        button.cmd-danger { 
            background: linear-gradient(180deg, #ff0000 0%, #800000 100%); 
            border: none; 
            color: white; 
            font-size: 1.1rem;
            box-shadow: 0 10px 20px rgba(255,0,0,0.3);
            grid-column: span 2;
        }

        .input-wrap { margin-bottom: 20px; text-align: left; }
        .input-wrap label { display: block; font-size: 0.7rem; color: #666; margin-bottom: 8px; text-transform: uppercase; font-weight: bold; }
        
        input.titan-field {
            background: #000;
            border: 2px solid #222;
            color: var(--gold);
            padding: 15px;
            width: 100%;
            font-size: 1.2rem;
            border-radius: 12px;
            font-family: var(--font-digital);
            text-align: center;
        }

        .overlay {
            display: none; 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: rgba(1, 1, 2, 0.99); 
            z-index: 100; 
            border-radius: 33px; 
            padding: 40px;
            border: 2px solid var(--neon-blue); 
            animation: bootIn 0.2s ease-out;
        }

        @keyframes bootIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* [SYSTEM PULSE ANIMATION] */
        .shake-active { animation: titan-shake 0.1s linear infinite; }
        @keyframes titan-shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -1px); }
            100% { transform: translate(1px, -1px); }
        }

        .w-red { background: #ff3b30; } .w-blue { background: #007aff; }
        .w-green { background: #34c759; } .w-yellow { background: #ffcc00; }
        .w-purple { background: #af52de; } .w-orange { background: #ff9500; }
        .w-white { background: #f2f2f7; } .w-grey { background: #48484a; }
        .w-teal { background: #5ac8fa; } .w-brown { background: #a2845e; }
    </style>
</head>
<body>

    <canvas id="neural-canvas"></canvas>

    <div id="mainframe">
        <div class="lang-switch">
            <div class="lang-btn active" onclick="engine.setLang('th', this)">TH</div>
            <div class="lang-btn" onclick="engine.setLang('en', this)">EN</div>
            <div class="lang-btn" onclick="engine.setLang('jp', this)">JP</div>
        </div>

        <div class="telemetry-bar">
            <span id="stat-link">OS: OMEGA v4.5 NITRO</span>
            <span id="stat-ping">PING: -- MS</span>
            <span id="stat-node">NODE: TOKYO-03</span>
        </div>

        <div id="view-setup" class="page">
            <div class="display-core">
                <h2 id="txt-title" style="color:var(--gold); margin:0; letter-spacing:4px; font-family: var(--font-digital);">BOMB DESIGNER</h2>
                <p id="txt-subtitle" style="font-size:0.6rem; color:#555; margin-top:8px; text-transform:uppercase;">Configure Lethal Parameters</p>
            </div>
            
            <div class="input-wrap">
                <label id="txt-timer-label">Deployment Timer (Seconds):</label>
                <input type="number" id="input-timer" value="45" min="5" max="999" class="titan-field">
            </div>

            <div class="input-wrap">
                <label id="txt-level-label">Lethality Level:</label>
                <div style="display:flex; gap:12px;">
                    <button class="cmd" id="lv-1" onclick="engine.setLethal(1.0, 'lv-1')">ROOKIE</button>
                    <button class="cmd active" id="lv-2" onclick="engine.setLethal(1.8, 'lv-2')">ELITE</button>
                    <button class="cmd" id="lv-3" onclick="engine.setLethal(3.5, 'lv-3')">GHOST</button>
                </div>
            </div>

            <button id="txt-arm-btn" class="cmd cmd-danger" onclick="engine.armSystem()">ARM PROTOCOL</button>
        </div>

        <div id="view-mission" class="page" style="display:none;">
            <div class="display-core">
                <p class="timer-readout" id="timer-val">00:00</p>
                <div class="progress-track">
                    <div id="progress-bar" class="progress-fill"></div>
                </div>
                <p id="mission-status" style="color:var(--gold); font-size:0.75rem; margin-top:15px; letter-spacing:1px;">INITIALIZING...</p>
            </div>
            
            <div class="wire-matrix" id="wire-grid"></div>

            <div class="control-array">
                <button id="txt-btn-analysis" class="cmd" onclick="engine.openOverlay('analysis')">ANALYSIS</button>
                <button id="txt-btn-log" class="cmd" onclick="engine.openOverlay('log')">MISSION LOG</button>
            </div>
        </div>

        <div id="view-lock" class="page" style="display:none; text-align:center;">
            <div class="display-core">
                <h1 id="lock-header" style="font-size:3.5rem; margin:0; line-height:1;"></h1>
            </div>
            <p id="txt-reboot-info" style="color:#666; font-size:0.75rem; margin-top:20px;">SYSTEM ENCRYPTION EXPIRED. OVERRIDE REQUIRED.</p>
            <input type="text" id="override-key" placeholder="ADMIN CODE" class="titan-field" style="border-color:var(--danger); margin-top:15px;">
            <button id="txt-reboot-btn" class="cmd cmd-danger" onclick="engine.systemReboot()" style="margin-top:20px; width:100%;">SYSTEM REBOOT</button>
        </div>

        <div id="overlay-modal" class="overlay">
            <div id="overlay-body"></div>
            <button id="txt-close-overlay" class="cmd" onclick="engine.closeOverlay()" style="width:100%; margin-top:35px; border-color:var(--gold);">RESUME MISSION</button>
        </div>
    </div>

    <script>
        const engine = (() => {
            const LANG_DATA = {
                th: {
                    title: "ระบบติดตั้งระเบิด", subtitle: "กำหนดค่าพารามิเตอร์ทำลายล้าง",
                    timerLabel: "ตัวจับเวลา (วินาที):", levelLabel: "ระดับความอันตราย:",
                    armBtn: "เริ่มระบบ PROTOCOL", statusInit: "กำลังเริ่มการทำงาน...",
                    statusNode: "เชื่อมต่อโหนด {n} สำเร็จ", btnAnalysis: "วิเคราะห์",
                    btnLog: "บันทึกภารกิจ", rebootInfo: "ระบบถูกล็อค กรุณาใส่รหัสกู้คืน",
                    rebootBtn: "รีบูตระบบใหม่", closeOverlay: "กลับเข้าสู่ภารกิจ",
                    boom: "ระเบิด! 💥", clear: "สำเร็จ! 🎖️",
                    analysisTitle: "ข้อมูลวงจร", analysisNote: "รหัสลำดับถูกดักจับแล้ว ระวังด้วย",
                    agentTitle: "โปรไฟล์เจ้าหน้าที่", agentRank: "ระดับ: {r}", rank1: "มือใหม่", rank2: "นักสืบระดับสูง"
                },
                en: {
                    title: "BOMB DESIGNER", subtitle: "Configure Lethal Parameters",
                    timerLabel: "Deployment Timer (Sec):", levelLabel: "Lethality Level:",
                    armBtn: "ARM PROTOCOL", statusInit: "STABILIZING CIRCUIT...",
                    statusNode: "NODE {n} SECURED.", btnAnalysis: "ANALYSIS",
                    btnLog: "MISSION LOG", rebootInfo: "SYSTEM EXPIRED. OVERRIDE REQUIRED.",
                    rebootBtn: "SYSTEM REBOOT", closeOverlay: "RESUME MISSION",
                    boom: "BOOM! 💥", clear: "CLEAR! 🎖️",
                    analysisTitle: "CIRCUIT DATA", analysisNote: "Sequence intercepted. Use caution.",
                    agentTitle: "AGENT PROFILE", agentRank: "RANK: {r}", rank1: "Rookie", rank2: "Senior Detective"
                },
                jp: {
                    title: "爆弾設計システム", subtitle: "致死パラメータ構成",
                    timerLabel: "作動タイマー (秒):", levelLabel: "致死レベル:",
                    armBtn: "プロトコル始動", statusInit: "回路安定化中...",
                    statusNode: "ノード {n} 安全確認。", btnAnalysis: "解析",
                    btnLog: "作戦記録", rebootInfo: "システム失効。オーバーライドが必要。",
                    rebootBtn: "システム再起動", closeOverlay: "任務に戻る",
                    boom: "爆発! 💥", clear: "解除成功! 🎖️",
                    analysisTitle: "回路データ", analysisNote: "シーケンスを傍受しました。注意してください。",
                    agentTitle: "エージェント情報", agentRank: "ランク: {r}", rank1: "新人", rank2: "ベテラン刑事"
                }
            };

            const CONFIG = {
                RECOVERY: "gurabud",
                STORAGE: "ayu_titan_v4",
                COLORS: ['red', 'blue', 'green', 'yellow', 'purple', 'orange', 'white', 'grey', 'teal', 'brown']
            };

            let state = {
                lang: 'th',
                active: false,
                order: [], // ลำดับสีที่ถูกต้อง
                wireColors: [], // สีที่แสดงบนหน้าจอ (สุ่มตำแหน่ง)
                current: 0,
                time: 45,
                maxTime: 45,
                lethality: 1.8,
                loop: null
            };

            const audio = new (window.AudioContext || window.webkitAudioContext)();
            const beep = (f, d, t = 'sine', v = 0.08) => {
                try {
                    const o = audio.createOscillator(), g = audio.createGain();
                    o.type = t; o.frequency.value = f;
                    g.gain.setValueAtTime(v, audio.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.0001, audio.currentTime + d/1000);
                    o.connect(g); g.connect(audio.destination);
                    o.start(); o.stop(audio.currentTime + d/1000);
                } catch(e) {}
            };

            const dom = id => document.getElementById(id);
            const getT = key => LANG_DATA[state.lang][key];

            const updateUIStrings = () => {
                dom('txt-title').innerText = getT('title');
                dom('txt-subtitle').innerText = getT('subtitle');
                dom('txt-timer-label').innerText = getT('timerLabel');
                dom('txt-level-label').innerText = getT('levelLabel');
                dom('txt-arm-btn').innerText = getT('armBtn');
                dom('txt-btn-analysis').innerText = getT('btnAnalysis');
                dom('txt-btn-log').innerText = getT('btnLog');
                dom('txt-reboot-info').innerText = getT('rebootInfo');
                dom('txt-reboot-btn').innerText = getT('rebootBtn');
                dom('txt-close-overlay').innerText = getT('closeOverlay');
            };

            return {
                setLang: (l, btn) => {
                    state.lang = l;
                    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    updateUIStrings();
                    beep(600, 50);
                },

                setLethal: (v, id) => {
                    state.lethality = v;
                    document.querySelectorAll('#view-setup .cmd').forEach(b => b.classList.remove('active'));
                    dom(id).classList.add('active');
                    beep(523, 60);
                },

                armSystem: () => {
                    const customT = parseInt(dom('input-timer').value);
                    state.time = isNaN(customT) || customT < 5 ? 45 : customT;
                    state.maxTime = state.time;
                    state.active = true;
                    state.current = 0;

                    // [RANDOMIZATION CORE]
                    // สุ่มสีสายไฟที่จะแสดง
                    state.wireColors = [...CONFIG.COLORS].sort(() => Math.random() - 0.5);
                    // สุ่มลำดับการตัด (ตัดจาก index 0 ไปถึง 9 ในอาเรย์ order)
                    state.order = [...Array(10).keys()].sort(() => Math.random() - 0.5);

                    dom('view-setup').style.display = 'none';
                    dom('view-mission').style.display = 'block';
                    dom('mission-status').innerText = getT('statusInit');

                    const grid = dom('wire-grid');
                    grid.innerHTML = "";
                    state.wireColors.forEach((color, idx) => {
                        grid.innerHTML += `
                            <div class="wire-unit">
                                <div class="wire-cable w-${color}" id="wire-${idx}" onclick="engine.cut(${idx})"></div>
                            </div>`;
                    });

                    engine.startTick();
                    beep(880, 250, 'triangle');
                    dom('stat-ping').innerText = `PING: ${Math.floor(Math.random()*20 + 20)} MS`;
                },

                startTick: () => {
                    if(state.loop) clearInterval(state.loop);
                    state.loop = setInterval(() => {
                        state.time -= (0.1 * state.lethality);
                        const display = Math.max(0, Math.ceil(state.time));
                        dom('timer-val').innerText = `00:${display < 10 ? '0'+display : display}`;
                        
                        const p = ((state.maxTime - state.time) / state.maxTime) * 100;
                        dom('progress-bar').style.width = `${p}%`;

                        if(display <= 8) {
                            dom('mainframe').classList.add('shake-active');
                            if(Math.floor(state.time * 10) % 4 === 0) beep(1600, 30, 'square');
                            if(window.navigator.vibrate) window.navigator.vibrate(40);
                        }

                        if(state.time <= 0) engine.terminate('dead');
                    }, 100);
                },

                cut: (idx) => {
                    if(!state.active) return;
                    const w = dom(`wire-${idx}`);
                    if(w.classList.contains('severed')) return;

                    // เช็คว่า index ที่กดตรงกับลำดับสีที่ต้องตัดหรือไม่
                    if(idx === state.order[state.current]) {
                        w.classList.add('severed');
                        state.current++;
                        dom('mission-status').innerText = getT('statusNode').replace('{n}', state.current);
                        beep(1000 + (state.current * 100), 80);
                        if(state.current === 10) engine.terminate('won');
                    } else {
                        engine.terminate('dead');
                    }
                },

                terminate: (res) => {
                    state.active = false;
                    clearInterval(state.loop);
                    dom('mainframe').classList.remove('shake-active');
                    localStorage.setItem(CONFIG.STORAGE, res);
                    if(res === 'dead') beep(150, 1000, 'sawtooth', 0.2);
                    setTimeout(() => engine.renderLock(res), 500);
                },

                renderLock: (res) => {
                    document.querySelectorAll('.page').forEach(v => v.style.display = 'none');
                    dom('view-lock').style.display = 'block';
                    const head = dom('lock-header');
                    head.innerText = res === 'dead' ? getT('boom') : getT('clear');
                    head.style.color = res === 'dead' ? 'var(--danger)' : 'var(--success)';
                },

                openOverlay: (type) => {
                    const m = dom('overlay-modal');
                    const b = dom('overlay-body');
                    m.style.display = 'block';
                    
                    if(type === 'analysis') {
                        // แสดงลำดับสีที่ต้องตัดตามลำดับที่สุ่มมา
                        const sequenceHtml = state.order.map((wireIdx, i) => {
                            const color = state.wireColors[wireIdx];
                            return `<span style="color:${color}">#${i+1}: ${color.toUpperCase()}</span>`;
                        }).join('<br>');

                        b.innerHTML = `
                            <h2 style="color:var(--gold); font-family:var(--font-digital);">${getT('analysisTitle')}</h2>
                            <p style="font-size:0.7rem; color:#888; border-left: 2px solid var(--neon-blue); padding-left:10px;">${getT('analysisNote')}</p>
                            <div style="background:#050505; padding:15px; border-radius:15px; border:1px dashed #333; line-height:1.6; font-size:0.8rem;">
                                ${sequenceHtml}
                            </div>`;
                    } else {
                        const rank = state.current > 7 ? getT('rank2') : getT('rank1');
                        b.innerHTML = `
                            <h2 style="font-family:var(--font-digital); color:var(--neon-blue);">${getT('agentTitle')}</h2>
                            <div style="text-align:left; font-size:0.85rem; color:#aaa; line-height:2;">
                                <p>NAME: Ayu Game Zone</p>
                                <p>${getT('agentRank').replace('{r}', rank)}</p>
                                <p>SUCCESS RATE: 99.1%</p>
                                <p>LOCATION: TAK, THAILAND</p>
                            </div>`;
                    }
                },

                closeOverlay: () => dom('overlay-modal').style.display = 'none',

                systemReboot: () => {
                    if(dom('override-key').value.toLowerCase() === CONFIG.RECOVERY) {
                        localStorage.removeItem(CONFIG.STORAGE);
                        location.reload();
                    } else {
                        beep(100, 500, 'sawtooth');
                        alert("ERROR: ACCESS DENIED.");
                    }
                },
                init: () => {
                    updateUIStrings();
                }
            };
        })();

        // [HIGH-PERFORMANCE CANVAS ENGINE]
        const canvas = document.getElementById('neural-canvas');
        const ctx = canvas.getContext('2d', { alpha: true });
        let dots = [];
        let animationId;

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            dots = Array(60).fill().map(() => ({
                x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                vx: (Math.random()-0.5)*0.8, vy: (Math.random()-0.5)*0.8
            }));
        }

        function animateCanvas() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "#00f2ff";
            ctx.strokeStyle = "rgba(0, 242, 255, 0.05)";
            
            const len = dots.length;
            for(let i=0; i<len; i++) {
                let d = dots[i];
                d.x += d.vx; d.y += d.vy;
                
                if(d.x<0 || d.x>canvas.width) d.vx *= -1;
                if(d.y<0 || d.y>canvas.height) d.vy *= -1;
                
                ctx.beginPath();
                ctx.arc(d.x, d.y, 1, 0, Math.PI*2);
                ctx.fill();
                
                for(let j=i+1; j<len; j++) {
                    let d2 = dots[j];
                    let dist = Math.hypot(d.x-d2.x, d.y-d2.y);
                    if(dist < 130) {
                        ctx.beginPath();
                        ctx.moveTo(d.x, d.y);
                        ctx.lineTo(d2.x, d2.y);
                        ctx.stroke();
                    }
                }
            }
            animationId = requestAnimationFrame(animateCanvas);
        }

        window.addEventListener('resize', () => {
            cancelAnimationFrame(animationId);
            initCanvas();
            animateCanvas();
        });

        initCanvas(); 
        animateCanvas();

        window.onload = () => {
            engine.init();
            const saved = localStorage.getItem('ayu_titan_v4');
            if(saved) engine.renderLock(saved);
        };
    </script>
</body>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The One-Shot Bomb 💣</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --bomb-red: #ff3e3e;
            --wire-gray: #444;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #bomb-container {
            background: #333;
            padding: 30px;
            border-radius: 15px;
            border: 5px solid #222;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.2);
            text-align: center;
        }

        .timer {
            font-size: 4rem;
            color: var(--bomb-red);
            text-shadow: 0 0 10px var(--bomb-red);
            margin-bottom: 20px;
            background: #111;
            padding: 10px;
            border-radius: 5px;
        }

        .wire-rack {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
        }

        .wire {
            width: 20px;
            height: 80px;
            background: var(--wire-gray);
            cursor: pointer;
            border-radius: 5px;
            transition: transform 0.2s;
            position: relative;
        }

        .wire:hover {
            transform: scale(1.1);
            filter: brightness(1.2);
        }

        .wire.cut {
            height: 30px;
            background: #111 !important;
            cursor: default;
        }

        h1 { margin-top: 0; color: #aaa; }
        p { font-size: 0.9rem; color: #666; }

        /* สีสายไฟที่แตกต่างกัน */
        .w0 { background: #e74c3c; } .w1 { background: #3498db; }
        .w2 { background: #2ecc71; } .w3 { background: #f1c40f; }
        .w4 { background: #9b59b6; } .w5 { background: #e67e22; }
        .w6 { background: #ecf0f1; } .w7 { background: #34495e; }
        .w8 { background: #1abc9c; } .w9 { background: #d35400; }
    </style>
</head>
<body>

    <div id="game-ui">
        <h1>BOMB DEFUSAL</h1>
        <div id="bomb-container">
            <div class="timer" id="timer-display">00:30</div>
            <div class="wire-rack" id="wire-rack">
                </div>
        </div>
        <p>ระวัง: ตัดผิดชีวิตเปลี่ยน (และเล่นไม่ได้อีกเลย)</p>
    </div>

    <div id="dead-ui" style="display:none; text-align:center;">
        <h1 style="color:red; font-size: 5rem;">BOOM! 💥</h1>
        <p>อุปกรณ์ของคุณถูกทำลายแล้ว... เข้าไปแก้ Code เพื่อฟื้นคืนชีพ</p>
    </div>

    <script>
        const wireRack = document.getElementById('wire-rack');
        const gameUI = document.getElementById('game-ui');
        const deadUI = document.getElementById('dead-ui');

        // สุ่มสายที่ "รอด" (มีแค่ 1 เส้นที่ตัดแล้วชนะ)
        const correctWire = Math.floor(Math.random() * 10);

        // เช็คสถานะการล็อคเกม
        if (localStorage.getItem('isDead') === 'true') {
            gameUI.style.display = 'none';
            deadUI.style.display = 'block';
            document.body.style.backgroundColor = 'black';
        }

        // สร้างสายไฟ 10 เส้น
        for (let i = 0; i < 10; i++) {
            const wire = document.createElement('div');
            wire.className = `wire w${i}`;
            wire.onclick = () => cutWire(i, wire);
            wireRack.appendChild(wire);
        }

        function cutWire(id, element) {
            if (element.classList.contains('cut')) return;
            
            element.classList.add('cut');

            if (id === correctWire) {
                alert("ยินดีด้วย! คุณกู้ระเบิดสำเร็จ 🎖️");
                // ถ้าชนะ จะให้เล่นต่อได้ หรือจะล็อคว่าชนะก็ได้แล้วแต่ชอบ
            } else {
                localStorage.setItem('isDead', 'true');
                alert("ตู้มมมมมม! สายไฟผิดเส้น!");
                location.reload();
            }
        }

        // ระบบคืนชีพ (พิมพ์ revive() ใน Console ของ Browser)
        window.revive = function() {
            localStorage.removeItem('isDead');
            location.reload();
            console.log("Rebooting system... สภาพกลับมา 100%");
        };
    </script>
</body>
</html>

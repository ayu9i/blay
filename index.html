<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Multi-Vibe GitHub Project</title>
</head>
<body>

    <h1>ระบบตรวจสอบสถานะ (Multi-Style Edition)</h1>
    <p>ลองเปิดดูใน Console (F12) เพื่อดูความเบียวและความฉ่ำของโค้ดครับ</p>

    <script>
        // ==========================================
        // 1. สไตล์ภาษาเบียว (THE DARK CHUUNIBYOU)
        // ==========================================
        /* คำพยากรณ์: ขุมพลังแห่งจอมมารที่ถูกกักขังในรูปของตัวแปร
           พันธสัญญา: หากค่าลอจิกเป็นเท็จ โลกจักดับสูญ
        */
        const ภาชนะบรรจุวิญญาณ = true; // isLoggedIn

        function ปลดผนึกอาคม(สถานะตราประทับ) {
            if (สถานะตราประทับ) {
                // ประตูมิติเปิดออก ขุมนรกยินดีต้อนรับเจ้า
                console.log("🌑 [DARK_LOG]: ผนึกถูกทำลาย... จอมมารหวนคืนสู่บัลลังก์!");
            } else {
                // พลังเวทย์อ่อนแอ เจ้าไม่มีสิทธิ์ครอบครองขุมพลังนี้
                console.log("⚔️ [DARK_LOG]: เจ้ามนุษย์ผู้โง่เขลา! จงถอยไปก่อนที่วิญญาณจะมอดไหม้");
            }
        }
        ปลดผนึกอาคม(ภาชนะบรรจุวิญญาณ);


        // ==========================================
        // 2. สไตล์วัยรุ่น Gen Z / Gen Alpha (SLAY & RIZZ)
        // ==========================================
        /*
           Vibe Check: โค้ดนี้คือตัวแม่ ตัวมัม แบบสับ
           No Cap: ถ้าบัคคือสภาพ! แต่ถ้าผ่านคือมี Aura
        */
        const isReal = true; 

        const checkVibe = (auraLevel) => {
            if (auraLevel) {
                // จึ้งมากแม่ ตัวมารดาจะแคร์เพื่อ
                console.log("💅 [GEN_Z]: ผ่านแบบฉ่ำ! Rizz แบบตะโกน No Cap!");
            } else {
                // สภาพ! Skibidi มากวิ ไปพักก่อน
                console.log("💀 [GEN_Z]: ตกขบวนว่ะแกรรร สภาพคือตุ๊บมาก!");
            }
        };
        checkVibe(isReal);


        // ==========================================
        // 3. สไตล์ภาษาหวาน คู่แต่งงาน (ROMANTIC COUPLE)
        // ==========================================
        /*
           สัญญาใจ: ทุกบรรทัดคือความรักที่เรามีให้กัน
           เพราะเธอคือบ้าน: และบ้านคือที่ที่มีเธอ (และโค้ดที่รันผ่าน)
        */
        const มีที่รักอยู่ข้างๆ = true;

        function ดูแลหัวใจ(สถานะความรัก) {
            if (สถานะความรัก) {
                // เพราะโลกใบนี้มีเธอ ทุกอย่างเลยสมบูรณ์แบบ
                console.log("💖 [SWEET]: ยินดีต้อนรับกลับบ้านนะที่รัก เค้าเตรียมข้าวไว้รอแล้ว");
            } else {
                // ถ้าไม่มีเธอ ใจเค้าก็ Error ไปหมดเลย
                console.log("😢 [SWEET]: เตงหายไปไหน... ใจเค้าว่างเปล่าเหมือน 404 เลย");
            }
        }
        ดูแลหัวใจ(มีที่รักอยู่ข้างๆ);


        // ==========================================
        // 4. ภาษาอังกฤษ (ENGLISH VIBE)
        // ==========================================
        /*
           Documentation: The ultimate crossover of styles.
        */
        console.log("🚀 [GLOBAL]: Project Deployed with 100% Personality.");
    </script>

    </body>
</html>

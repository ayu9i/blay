<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONAN: THE FINAL ULTIMATUM 💣</title>
    <style>
        :root { --danger: #ff0000; --success: #00ff00; --gold: #ffd700; --bg: #050505; }
        body { background-color: var(--bg); color: white; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; touch-action: manipulation; }
        #app-container { background: #1a1a1a; padding: 25px; border: 4px solid #333; border-radius: 20px; box-shadow: 0 0 30px rgba(255,0,0,0.3); width: 95%; max-width: 480px; position: relative; }
        
        /* Digital Screen */
        .digital-screen { background: #000; border: 2px solid #444; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center; }
        .timer { font-size: 3.5rem; color: var(--danger); text-shadow: 0 0 15px var(--danger); font-weight: bold; margin: 0; }
        .blink { animation: blinker 0.8s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.2; } }

        /* Wires & Flow Effect */
        .wire-box { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 20px; }
        .wire { width: 100%; height: 85px; border-radius: 8px; cursor: pointer; position: relative; overflow: hidden; transition: 0.3s; box-shadow: inset -4px 0 8px rgba(0,0,0,0.6); }
        .wire::after { content: ""; position: absolute; top: -100%; left: 0; width: 100%; height: 40%; background: rgba(255,255,255,0.25); animation: flow 1.2s linear infinite; }
        @keyframes flow { from { top: -100%; } to { top: 100%; } }
        .wire.cut { height: 22px; background: #111 !important; cursor: default; opacity: 0.2; transform: translateY(15px); }
        .wire.cut::after { display: none; }

        /* Setup & Modal */
        .setup-screen { text-align: center; }
        .diff-btn { padding: 12px; margin: 5px; cursor: pointer; border: 1px solid var(--gold); background: #222; color: var(--gold); border-radius: 8px; font-weight: bold; width: 120px; }
        .diff-btn.active { background: var(--gold); color: black; box-shadow: 0 0 10px var(--gold); }
        #modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,20,0,0.98); z-index: 100; border-radius: 20px; padding: 25px; box-sizing: border-box; border: 3px solid var(--success); color: var(--success); overflow-y: auto; }
        
        /* Lock View */
        #lock-view { display: none; text-align: center; animation: pulse-bg 2s infinite; }
        @keyframes pulse-bg { 0% { background: #1a0000; } 50% { background: #330000; } 100% { background: #1a0000; } }
        input { background: #000; border: 2px solid var(--danger); color: var(--danger); padding: 15px; width: 85%; border-radius: 8px; text-align: center; font-size: 1.2rem; margin-bottom: 15px; font-family: inherit; }
        
        .shake { animation: shake-screen 0.15s infinite; }
        @keyframes shake-screen { 0%{transform:translate(2px,2px)} 50%{transform:translate(-2px,-2px)} 100%{transform:translate(2px,-2px)} }

        /* Wire Colors */
        .w0{background:#ff3e3e} .w1{background:#3498db} .w2{background:#2ecc71} .w3{background:#f1c40f} .w4{background:#9b59b6}
        .w5{background:#e67e22} .w6{background:#ecf0f1} .w7{background:#34495e} .w8{background:#1abc9c} .w9{background:#d35400}
    </style>
</head>
<body>

    <div id="app-container">
        <div id="setup-view" class="setup-screen">
            <h2 style="color:var(--gold); text-shadow: 0 0 5px var(--gold);">BOMB CONFIGURATION</h2>
            <p>เลือกระดับความยาก:</p>
            <button class="diff-btn" onclick="setDiff(1, this)">EASY (90%)</button>
            <button class="diff-btn active" onclick="setDiff(1.8, this)">NORMAL (80%)</button>
            <button class="diff-btn" onclick="setDiff(3.5, this)">HARD (100%)</button>
            <p style="margin-top:20px;">ตั้งเวลา (5-999 วินาที):</p>
            <input type="number" id="time-input" value="45" style="width:120px; border-color:var(--gold); color:var(--gold); border-radius:8px;">
            <button onclick="startMission()" style="background:var(--danger); color:white; border:none; padding:15px; font-size:1.3rem; margin-top:15px;">ARM DEVICE 🧨</button>
        </div>

        <div id="game-view" style="display: none;">
            <div class="digital-screen">
                <p class="timer" id="countdown">00:00</p>
                <div id="status-tag" style="color:var(--gold); font-size: 0.8rem; margin-top:5px;">SYSTEM: STABLE</div>
            </div>
            <div class="wire-box" id="wire-grid"></div>
            <button onclick="toggleModal(true)" style="border-color:var(--success); color:var(--success);">📂 ANALYZE SCHEMATIC</button>
        </div>

        <div id="lock-view">
            <h1 id="lock-status" style="font-size:3.5rem; margin:10px 0;"></h1>
            <p id="lock-msg" style="color:#aaa; margin-bottom:20px;"></p>
            <input type="text" id="unlock-code" placeholder="ENTER RECOVERY CODE">
            <button onclick="attemptUnlock()" style="background:var(--danger); color:white; border:none; padding:15px;">RECOVERY SYSTEM</button>
        </div>

        <div id="modal">
            <h3 style="border-bottom:1px solid var(--success); padding-bottom:10px;">[ CASE FILE: CLASSIFIED ]</h3>
            <div id="modal-content" style="line-height:1.6; font-size:0.85rem;"></div>
            <button onclick="toggleModal(false)" style="margin-top:20px; background:#003300; border-color:var(--success);">CLOSE</button>
        </div>
    </div>

    <script>
        const RECOVERY_KEY = "gurabud";
        const STATE_KEY = "conan_final_state";
        let sequence = [], currentStep = 0, timeLeft = 45, timer, diffMult = 1.8;
        const audio = new (window.AudioContext || window.webkitAudioContext)();

        function playBeep(f, d) {
            const o = audio.createOscillator(), g = audio.createGain();
            o.connect(g); g.connect(audio.destination);
            o.frequency.value = f; g.gain.value = 0.05;
            o.start(); setTimeout(() => o.stop(), d);
        }

        function setDiff(v, b) {
            diffMult = v;
            document.querySelectorAll('.diff-btn').forEach(btn => btn.classList.remove('active'));
            b.classList.add('active');
        }

        function startMission() {
            timeLeft = parseInt(document.getElementById('time-input').value) || 45;
            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('game-view').style.display = 'block';
            
            sequence = Array.from({length: 10}, (_, i) => i).sort(() => Math.random() - 0.5);
            const grid = document.getElementById('wire-grid');
            grid.innerHTML = "";
            for(let i=0; i<10; i++) grid.innerHTML += `<div class="wire w${i}" id="w${i}" onclick="cut(${i})"></div>`;
            
            timer = setInterval(() => {
                timeLeft -= (0.1 * diffMult);
                let sec = Math.max(0, Math.ceil(timeLeft));
                document.getElementById('countdown').innerText = `00:${sec < 10 ? '0'+sec : sec}`;
                
                if(sec <= 10) {
                    document.getElementById('countdown').classList.add('blink');
                    playBeep(1200, 40);
                } else { playBeep(600, 20); }

                if(sec <= 5) document.getElementById('app-container').classList.add('shake');
                if(timeLeft <= 0) finalize('dead');
            }, 100);
        }

        function cut(id) {
            if(document.getElementById(`w${id}`).classList.contains('cut')) return;
            if(navigator.vibrate) navigator.vibrate(40);
            
            if(id === sequence[currentStep]) {
                document.getElementById(`w${id}`).classList.add('cut');
                playBeep(1500, 100);
                currentStep++;
                if(currentStep === 10) finalize('won');
            } else { finalize('dead'); }
        }

        function finalize(s) {
            clearInterval(timer);
            if(s === 'dead' && navigator.vibrate) navigator.vibrate([400, 100, 400]);
            localStorage.setItem(STATE_KEY, s);
            renderLock(s);
        }

        function renderLock(s) {
            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('game-view').style.display = 'none';
            document.getElementById('lock-view').style.display = 'block';
            const status = document.getElementById('lock-status');
            status.innerText = s === 'dead' ? "BOOM! 💥" : "CLEAR! 🎖️";
            status.style.color = s === 'dead' ? 'var(--danger)' : 'var(--success)';
            document.getElementById('lock-msg').innerText = s === 'dead' ? "ความพยายามล้มเหลว... ระบบถูกทำลาย" : "กู้สำเร็จ! คุณรักษาความปลอดภัยไว้ได้";
        }

        function toggleModal(show) {
            const m = document.getElementById('modal');
            m.style.display = show ? 'block' : 'none';
            if(show) {
                document.getElementById('modal-content').innerHTML = `
                <p style="color:var(--gold)">[ ANALYSIS LOG ]</p>
                - พบลำดับสัญญาณ: W${sequence[0]} > W${sequence[1]} > W${sequence[2]}<br>
                - ลำดับที่เหลือ: ${sequence.slice(3).join(' -> ')}<br><br>
                <p style="font-size:0.7rem; color:#006600;">"ความจริงมีเพียงหนึ่งเดียวเท่านั้น... อย่าให้เวลาหลอกคุณ!"</p>`;
            }
        }

        function attemptUnlock() {
            if(document.getElementById('unlock-code').value.toLowerCase() === RECOVERY_KEY) {
                localStorage.removeItem(STATE_KEY);
                location.reload();
            } else { 
                alert("INVALID CODE!");
                if(navigator.vibrate) navigator.vibrate(200);
            }
        }

        const currentStatus = localStorage.getItem(STATE_KEY);
        if(currentStatus) renderLock(currentStatus);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONAN: CIRCUIT SCHEMATIC 💣</title>

<style>
:root { --danger: #ff4d4d; --success: #2ecc71; --bg: #050505; --panel: #1a1a1a; --gold: #f1c40f; }

body {
  background-color: var(--bg);
  color: #ecf0f1;
  font-family: 'Courier New', monospace;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  margin: 0;
  overflow: hidden;
}

#app-container {
  background: var(--panel);
  padding: 30px;
  border: 4px solid #333;
  border-radius: 20px;
  box-shadow: 0 0 50px rgba(255,0,0,0.1);
  width: 90%;
  max-width: 450px;
  position: relative;
}

.digital-screen {
  background: #000;
  border: 2px solid #444;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
  text-align: center;
}

.timer {
  font-size: 3rem;
  color: var(--danger);
  text-shadow: 0 0 15px var(--danger);
}

.progress-bar {
  color: var(--gold);
  margin-top: 10px;
}

.wire-box {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px;
}

.wire {
  height: 80px;
  border-radius: 5px;
  cursor: pointer;
  transition: 0.3s;
}

.wire.cut {
  height: 25px;
  background: #111 !important;
  opacity: 0.2;
  transform: translateY(10px);
}

.w0{background:#ff3e3e} .w1{background:#3498db} .w2{background:#2ecc71} .w3{background:#f1c40f} .w4{background:#9b59b6}
.w5{background:#e67e22} .w6{background:#ecf0f1} .w7{background:#34495e} .w8{background:#1abc9c} .w9{background:#d35400}

button {
  margin-top: 15px;
  width: 100%;
  padding: 10px;
  border: 1px solid var(--success);
  background: #222;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}

#manual-overlay {
  display: none;
  position: absolute;
  inset: 0;
  background: #001500;
  color: var(--success);
  padding: 20px;
  overflow: auto;
}

.schematic-box {
  border: 1px solid var(--success);
  padding: 10px;
  font-size: 0.75rem;
  white-space: pre;
}

@keyframes shake {
  0% { transform: translate(1px,1px); }
  50% { transform: translate(-1px,-1px); }
  100% { transform: translate(1px,-1px); }
}
</style>
</head>

<body>

<div id="app-container">

<div id="game-view">
  <div class="digital-screen">
    <div class="timer" id="countdown">00:30</div>
    <div class="progress-bar" id="progress">STEP: 0 / 10</div>
  </div>

  <div class="wire-box" id="wire-grid"></div>

  <button onclick="toggleManual(true)">📂 ดูแผนผัง</button>
</div>

<div id="lock-view" style="display:none; text-align:center;">
  <h2 id="lock-status"></h2>
  <p id="lock-msg"></p>
  <input id="unlock-code" placeholder="code">
  <button onclick="unlock()">REBOOT</button>
</div>

<div id="manual-overlay">
  <h3>[ CIRCUIT DIAGRAM ]</h3>
  <div class="schematic-box" id="schematic-content"></div>
  <button onclick="toggleManual(false)">ปิด</button>
</div>

</div>

<script>
let sequence = [];
let step = 1;
let time = 00;
let timer;

const correct = new Audio("https://www.soundjay.com/button/sounds/button-3.mp3");
const wrong = new Audio("https://www.soundjay.com/button/sounds/button-10.mp3");

function vibrate(ms){ if(navigator.vibrate) navigator.vibrate(ms); }

function init(){
  sequence = [...Array(10).keys()].sort(()=>Math.random()-0.5);
  render();
  schematic();
  start();
}

function render(){
  const grid = document.getElementById("wire-grid");
  grid.innerHTML="";
  for(let i=0;i<10;i++){
    let d=document.createElement("div");
    d.className="wire w"+i;
    d.onclick=()=>cut(i);
    grid.appendChild(d);
  }
}

function schematic(){
  let txt="";
  sequence.forEach((s,i)=> txt+=`WIRE_${s} (${i+1})\n`);
  document.getElementById("schematic-content").innerText=txt;
}

function start(){
  timer=setInterval(()=>{
    time--;
    document.getElementById("countdown").innerText="00:"+String(time).padStart(2,"0");

    if(time<=10){
      document.body.style.animation="shake 0.2s infinite";
    }

    if(time<=0) end(false);
  },1000);
}

function cut(i){
  if(i===sequence[step]){
    correct.play();
    vibrate(50);
    step++;
    document.getElementById("progress").innerText=`STEP: ${step} / 10`;
    if(step===10) end(true);
  }else{
    wrong.play();
    vibrate(200);
    end(false);
  }
}

function end(win){
  clearInterval(timer);
  document.getElementById("game-view").style.display="none";
  document.getElementById("lock-view").style.display="block";

  if(win){
    lock-status.innerText="DEFUSED 🎖️";
    lock-msg.innerText="โคนันชัดๆ";
  }else{
    lock-status.innerText="BOOM 💥";
    lock-msg.innerText="พลาดละ...";
    document.body.style.background="darkred";
  }
}

function toggleManual(s){
  document.getElementById("manual-overlay").style.display=s?"block":"none";
}

function unlock(){
  if(document.getElementById("unlock-code").value==="gurabud"){
    location.reload();
  }else alert("ผิด");
}

init();
</script>

</body>
</html>

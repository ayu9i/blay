<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM CRITICAL ERROR | HACKED</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* ล้างค่าเดิมและตั้งค่าพื้นฐานสำหรับหน้าจอแฮ็ก */
        :root { 
            --hacker-green: #00FF41; 
            --bg-black: #000;
        }
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-black);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier Prime', monospace;
        }

        /* --- Matrix Canvas Background --- */
        #matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* --- Overlay Content --- */
        .hacker-overlay {
            position: relative;
            z-index: 2;
            text-align: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border: 2px solid var(--hacker-green);
            box-shadow: 0 0 20px var(--hacker-green);
            max-width: 90%;
            animation: flicker 0.1s infinite;
        }

        .status-msg {
            color: var(--hacker-green);
            font-size: 1.5rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 20px;
        }

        .warning-text {
            color: #ff0000;
            font-size: 1rem;
            margin-top: 10px;
            border-top: 1px solid #ff0000;
            padding-top: 10px;
        }

        /* Animation เอฟเฟกต์หน้าจอเสีย */
        @keyframes flicker {
            0% { opacity: 0.9; }
            50% { opacity: 1; }
            100% { opacity: 0.9; }
        }

        /* ซ่อนระบบเดิมทั้งหมด */
        #loginOverlay, #chatWindow, #customAlert {
            display: none !important;
        }
    </style>
</head>
<body>

    <canvas id="matrixCanvas"></canvas>

    <div class="hacker-overlay">
        <div class="status-msg">SYSTEM HACKED</div>
        <div style="color: #00FF41; font-size: 0.8rem;">
            ACCESS DENIED... BYPASSING SECURITY...<br>
            ENCRYPTING DATABASE... 100% DONE<br>
            DELETING CONAN_ASSISTANT_V2.SYS
        </div>
        <div class="warning-text">CRITICAL ERROR: CONNECTION LOST</div>
    </div>

    <script>
        // ระบบ Matrix Code Rain (โค้ดไหลไม่มีที่สิ้นสุด)
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // ตัวอักษรที่จะให้ไหล (โคนันแฝงตัวเลขและโค้ด)
        const characters = "CONAN01SHINICHIAPTX4869KID1412ERRORHACKED010101";
        const fontSize = 16;
        const columns = canvas.width / fontSize;

        // เก็บตำแหน่ง Y ของแต่ละแถว
        const drops = [];
        for (let i = 0; i < columns; i++) {
            drops[i] = 1;
        }

        function drawMatrix() {
            // สร้างพื้นหลังกึ่งโปร่งใสเพื่อให้เห็นรอยลาก
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#00FF41"; // สีเขียวแฮ็กเกอร์
            ctx.font = fontSize + "px 'Courier Prime'";

            for (let i = 0; i < drops.length; i++) {
                // สุ่มตัวอักษร
                const text = characters.charAt(Math.floor(Math.random() * characters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                // เมื่อไหลลงมาจนสุดหน้าจอ ให้สุ่มกลับไปเริ่มใหม่ด้านบน
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }

                drops[i]++;
            }
        }

        // ปรับขนาด Canvas เมื่อรีไซส์หน้าจอ
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // รัน Loop การวาดโค้ดไหล
        setInterval(drawMatrix, 33);

        // บล็อกฟังก์ชันเดิมทั้งหมด
        window.handleLogin = function() { return false; };
        window.botReply = function() { return false; };
        console.log("SECURITY BREACH: SYSTEM TERMINATED.");
    </script>
</body>
</html>

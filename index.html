<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM_FAILURE: ACCESS_DENIED</title>
    <style>
        body {
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-shadow: 0 0 5px #0f0;
        }

        .container {
            width: 80%;
            max-width: 800px;
        }

        .terminal-header {
            border-bottom: 1px solid #0f0;
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .error-msg {
            color: #f00;
            text-shadow: 0 0 5px #f00;
            font-weight: bold;
            animation: blink 0.8s infinite;
        }

        .typing-text {
            border-right: 2px solid #0f0;
            white-space: nowrap;
            overflow: hidden;
            display: inline-block;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }

        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(0, 255, 0, 0.1);
            position: absolute;
            top: 0;
            left: 0;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            from { top: 0; }
            to { top: 100%; }
        }

        .glitch {
            position: relative;
        }
    </style>
</head>
<body>
    <div class="scanline"></div>
    
    <div class="container">
        <div class="terminal-header">
            [ REMOTE_HOST: GITHUB_SERVER ]<br>
            [ STATUS: DISCONNECTED ]
        </div>

        <div class="glitch">
            <p class="error-msg">>>> CRITICAL_ERROR: REPOSITORY_ENCRYPTED <<<</p>
            <p id="log"></p>
            <p id="command-line">root@system:~# <span class="typing-text" id="typing"></span></p>
        </div>
    </div>

    <script>
        const logs = [
            "Detecting unauthorized access...",
            "Firewall breached...",
            "Encrypting project files...",
            "Disconnecting database...",
            "System going offline..."
        ];

        const typingElement = document.getElementById('typing');
        const logElement = document.getElementById('log');
        let logIndex = 0;

        function addLog() {
            if (logIndex < logs.length) {
                logElement.innerHTML += `[ OK ] ${logs[logIndex]}<br>`;
                logIndex++;
                setTimeout(addLog, 800);
            } else {
                startTyping();
            }
        }

        function startTyping() {
            const text = "shutdown -h now --force";
            let charIndex = 0;
            
            const timer = setInterval(() => {
                if (charIndex < text.length) {
                    typingElement.innerHTML += text.charAt(charIndex);
                    charIndex++;
                } else {
                    clearInterval(timer);
                    setTimeout(startCountdown, 1500); // เมื่อพิมพ์เสร็จ เริ่มการนับถอยหลัง
                }
            }, 100);
        }

        function startCountdown() {
            let count = 3;
            document.body.innerHTML = `<div style="text-align:center;">
                <h1 style="color:red; font-size: 50px;">SYSTEM OFFLINE</h1>
                <h2 id="countdown" style="color:white; font-size: 80px;">3</h2>
            </div>`;

            const countdownElement = document.getElementById('countdown');
            const countdownTimer = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownElement.innerText = count;
                } else {
                    clearInterval(countdownTimer);
                    executeBoom();
                }
            }, 1000);
        }

        function executeBoom() {
            // เอฟเฟกต์ "ตู้ม"
            document.body.style.backgroundColor = "white";
            document.body.innerHTML = `<h1 style="color:black; font-size: 100px; font-weight: bold;">ตู้ม!</h1>`;
            
            setTimeout(() => {
                document.body.style.backgroundColor = "black";
                document.body.innerHTML = `
                    <div style="text-align:center; padding: 20px;">
                        <h1 style="color:red; font-size: 40px; text-shadow: 2px 2px #000;">[ ACCESS REVOKED ]</h1>
                        <p style="color:#0f0; font-size: 20px;">ถูกเพิกถอนการใช้งานโดย Google</p>
                        <p style="color:#444; font-size: 14px;">Connection closed. (Code 0x0000045)</p>
                    </div>
                `;
            }, 200);
        }

        // Start the sequence
        setTimeout(addLog, 1000);
    </script>
</body>
</html>
